name: Level 7 - Star Road

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  everything-everywhere:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
      LATEST: ghcr.io/${{ github.repository }}:latest
      JACOCO_XML: build/reports/jacoco/test/jacocoTestReport.xml

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/daemon
            ~/.gradle/native
            ~/.gradle/notifications
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties', '**/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --scan --no-daemon

      - name: Run tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/test-results/test
            build/reports/tests/test

      - name: Run tests + generate JaCoCo report
        env:
          JACOCO_MINIMUM_COVERAGE: "0.60"
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            build/reports/jacoco/test/jacocoTestReport.xml
            build/reports/jacoco/test/html

      - name: Build artifact
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Prepare Docker context
        run: |
          JAR=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n1)
          cp "$JAR" docker/app.jar

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build container image
        run: |
          docker build \
            -t ${IMAGE} \
            -t ${LATEST} \
            -f docker/Dockerfile \
            docker

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${IMAGE}
          docker push ${LATEST}
